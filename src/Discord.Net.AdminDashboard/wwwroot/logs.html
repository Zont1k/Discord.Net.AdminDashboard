<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs - Discord.Net Admin</title>
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#5865f2"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="14" font-weight="700">D</text></svg>
        <span class="sidebar-brand">Admin Panel</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <a href="/" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Overview</a>
      <a href="/guilds.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Guilds</a>
      <a href="/jobs.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Jobs</a>
      <a href="/logs.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Logs</a>
    </div>
    <div class="sidebar-footer">
      <div class="status-badge"><span class="status-dot"></span>Connected</div>
      <span class="sidebar-version">v1.0.0</span>
    </div>
  </nav>
  <div class="main-area">
    <header class="topbar">
      <h1 class="page-title">Live Logs</h1>
    </header>
    <main class="content">
      <div class="logs-container">
        <div class="logs-toolbar">
          <button class="btn btn-sm btn-secondary" onclick="clearLogs()">Clear</button>
          <button class="btn btn-sm btn-secondary" id="scrollBtn" onclick="toggleAutoScroll()">Auto-scroll: ON</button>
        </div>
        <div class="log-viewer" id="logViewer"></div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script>
let autoScroll = true;
let connection = null;

async function loadRecent() {
  if (!connection) return;
  try {
    const logs = await connection.invoke('GetRecent');
    renderLogs(logs);
  } catch (e) {
    console.error('Failed to load recent logs:', e);
  }
}

function renderLogs(logs) {
  const viewer = document.getElementById('logViewer');
  const html = logs.map(l => {
    const t = new Date(l.timestamp).toLocaleTimeString();
    return `<div class="log-line ${l.cssClass}">
      <span class="log-time">${t}</span>
      <span class="log-level">${l.level}</span>
      <span class="log-source">${l.source}</span>
      <span class="log-msg">${escapeHtml(l.message)}</span>
    </div>`;
  }).join('');
  viewer.innerHTML = html;
  if (autoScroll) viewer.scrollTop = viewer.scrollHeight;
}

function appendLog(log) {
  const viewer = document.getElementById('logViewer');
  const t = new Date(log.timestamp).toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'log-line ' + log.cssClass;
  div.innerHTML = '<span class="log-time">' + t + '</span><span class="log-level">' + log.level + '</span><span class="log-source">' + escapeHtml(log.source) + '</span><span class="log-msg">' + escapeHtml(log.message) + '</span>';
  viewer.appendChild(div);
  if (autoScroll) viewer.scrollTop = viewer.scrollHeight;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function clearLogs() {
  document.getElementById('logViewer').innerHTML = '';
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  document.getElementById('scrollBtn').textContent = 'Auto-scroll: ' + (autoScroll ? 'ON' : 'OFF');
}

async function initSignalR() {
  try {
    connection = new signalR.HubConnectionBuilder()
      .withUrl('/hubs/logs')
      .withAutomaticReconnect()
      .build();
    connection.on('LogReceived', appendLog);
    await connection.start();
    loadRecent();
  } catch (e) {
    console.error('SignalR connection failed:', e);
    document.getElementById('logViewer').innerHTML = '<div class="empty-state">Failed to connect to log stream. Is the server running?</div>';
  }
}

initSignalR();
</script>
</body>
</html>
