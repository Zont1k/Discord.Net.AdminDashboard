<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs - Discord Bot Admin</title>
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect width="26" height="26" rx="6" fill="#4f8ef7"/><text x="13" y="18" text-anchor="middle" fill="white" font-size="14" font-weight="800" font-family="sans-serif">D</text></svg>
        <span class="sidebar-brand">BotPanel</span>
      </div>
      <span class="sidebar-badge">v2.0</span>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">Navigation</div>
      <a href="/" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Overview
      </a>
      <a href="/guilds.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Guilds
      </a>
      <a href="/jobs.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Jobs
      </a>
      <a href="/logs.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Logs
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>Connected</span>
      </div>
      <span class="sidebar-version">v2.0.0</span>
    </div>
  </nav>
  <div class="main-area">
    <header class="topbar">
      <h1 class="page-title">Live Logs</h1>
      <div class="topbar-right">
        <span style="font-size:11px;color:var(--text-muted)" id="logCountLabel">0 entries</span>
      </div>
    </header>
    <main class="content">
      <div class="logs-container">
        <div class="logs-toolbar">
          <div class="jobs-filter">
            <button class="filter-btn active" data-level="all" onclick="setLogLevel('all')">All</button>
            <button class="filter-btn" data-level="info" onclick="setLogLevel('info')">Info</button>
            <button class="filter-btn" data-level="warn" onclick="setLogLevel('warn')">Warn</button>
            <button class="filter-btn" data-level="error" onclick="setLogLevel('error')">Error</button>
            <button class="filter-btn" data-level="debug" onclick="setLogLevel('debug')">Debug</button>
          </div>
          <div style="flex:1"></div>
          <button class="btn btn-sm btn-secondary" onclick="clearLogs()">Clear</button>
          <button class="btn btn-sm btn-secondary" id="scrollBtn" onclick="toggleAutoScroll()">Auto-scroll: ON</button>
        </div>
        <div class="log-viewer" id="logViewer"></div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script>
let autoScroll = true;
let connection = null;
let allLogs = [];
let currentLevel = 'all';

async function loadRecent() {
  if (!connection) return;
  try {
    allLogs = await connection.invoke('GetRecent');
    renderLogs();
  } catch (e) {
    console.error('Failed to load recent logs:', e);
  }
}

function renderLogs() {
  const viewer = document.getElementById('logViewer');
  const filtered = currentLevel === 'all'
    ? allLogs
    : allLogs.filter(l => l.level.toLowerCase() === currentLevel);
  document.getElementById('logCountLabel').textContent = filtered.length + ' entries';
  const html = filtered.map(l => {
    const t = new Date(l.timestamp).toLocaleTimeString();
    return '<div class="log-line ' + l.cssClass + '">' +
      '<span class="log-time">' + t + '</span>' +
      '<span class="log-level">' + l.level + '</span>' +
      '<span class="log-source">' + escapeHtml(l.source) + '</span>' +
      '<span class="log-msg">' + escapeHtml(l.message) + '</span>' +
    '</div>';
  }).join('');
  viewer.innerHTML = html;
  if (autoScroll) viewer.scrollTop = viewer.scrollHeight;
}

function appendLog(log) {
  allLogs.push(log);
  if (currentLevel === 'all' || log.level.toLowerCase() === currentLevel) {
    const viewer = document.getElementById('logViewer');
    const t = new Date(log.timestamp).toLocaleTimeString();
    const div = document.createElement('div');
    div.className = 'log-line ' + log.cssClass;
    div.innerHTML = '<span class="log-time">' + t + '</span>' +
      '<span class="log-level">' + log.level + '</span>' +
      '<span class="log-source">' + escapeHtml(log.source) + '</span>' +
      '<span class="log-msg">' + escapeHtml(log.message) + '</span>';
    viewer.appendChild(div);
    document.getElementById('logCountLabel').textContent =
      (parseInt(document.getElementById('logCountLabel').textContent) || 0) + ' entries';
    if (autoScroll) viewer.scrollTop = viewer.scrollHeight;
  }
}

function setLogLevel(level) {
  currentLevel = level;
  document.querySelectorAll('[data-level]').forEach(b => {
    b.classList.toggle('active', b.dataset.level === level);
  });
  renderLogs();
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function clearLogs() {
  allLogs = [];
  document.getElementById('logViewer').innerHTML = '';
  document.getElementById('logCountLabel').textContent = '0 entries';
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  document.getElementById('scrollBtn').textContent = 'Auto-scroll: ' + (autoScroll ? 'ON' : 'OFF');
}

async function initSignalR() {
  try {
    connection = new signalR.HubConnectionBuilder()
      .withUrl('/hubs/logs')
      .withAutomaticReconnect()
      .build();
    connection.on('LogReceived', appendLog);
    await connection.start();
    loadRecent();
  } catch (e) {
    console.error('SignalR connection failed:', e);
    document.getElementById('logViewer').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9888;</div><div class="empty-state-title">Connection Failed</div><div class="empty-state-desc">Could not connect to log stream. Is the server running?</div></div>';
  }
}

initSignalR();
</script>
</body>
</html>
