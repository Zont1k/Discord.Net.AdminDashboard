<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Discord.Net Admin</title>
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#5865f2"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="14" font-weight="700">D</text></svg>
        <span class="sidebar-brand">Admin Panel</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <a href="/" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a href="/guilds.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Guilds
      </a>
      <a href="/jobs.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Jobs
      </a>
      <a href="/logs.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Logs
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="status-badge">
        <span class="status-dot"></span>
        Connected
      </div>
      <span class="sidebar-version"><span id="versionText">v1.0.0</span></span>
    </div>
  </nav>
  <div class="main-area">
    <header class="topbar">
      <h1 class="page-title">Overview</h1>
      <div class="ping-badge">
        <span class="ping-dot"></span>
        <span id="pingText">--</span> ms
      </div>
    </header>
    <main class="content">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-icon stat-icon-guilds"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div><div class="stat-body"><div class="stat-value" id="statGuilds">--</div><div class="stat-label">Guilds</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-users"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-body"><div class="stat-value" id="statUsers">--</div><div class="stat-label">Total Users</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-online"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></div><div class="stat-body"><div class="stat-value" id="statOnline">--</div><div class="stat-label">Online Now</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-jobs"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-body"><div class="stat-value" id="statJobs">--</div><div class="stat-label">Active Jobs</div></div></div>
      </div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-header"><h3>System</h3></div>
          <div class="info-card-body">
            <div class="info-row"><span class="info-key">Uptime</span><span class="info-value" id="infoUptime">--</span></div>
            <div class="info-row"><span class="info-key">CPU</span><span class="info-value" id="infoCpu">--</span></div>
            <div class="info-row"><span class="info-key">Memory</span><span class="info-value" id="infoMemory">--</span></div>
          </div>
        </div>
        <div class="info-card">
          <div class="info-card-header"><h3>Jobs</h3></div>
          <div class="info-card-body">
            <div class="info-row"><span class="info-key">Pending</span><span class="info-value" id="infoPending">--</span></div>
            <div class="info-row"><span class="info-key">Failed</span><span class="info-value" id="infoFailed">--</span></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    if (!res.ok) throw new Error(res.statusText);
    const s = await res.json();
    document.getElementById('statGuilds').textContent = s.guildCount;
    document.getElementById('statUsers').textContent = s.totalUsers.toLocaleString();
    document.getElementById('statOnline').textContent = s.onlineUsers.toLocaleString();
    document.getElementById('statJobs').textContent = s.activeJobs;
    document.getElementById('infoUptime').textContent = s.uptimeHours + 'h';
    document.getElementById('infoCpu').textContent = s.cpuPercent + '%';
    document.getElementById('infoMemory').textContent = s.memoryMb + ' MB';
    document.getElementById('infoPending').textContent = s.pendingJobs;
    document.getElementById('infoFailed').textContent = s.failedJobs;
    document.getElementById('pingText').textContent = s.latencyMs;
  } catch (e) {
    console.error('Failed to load stats:', e);
  }
}
loadStats();
setInterval(loadStats, 5000);
</script>
</body>
</html>
