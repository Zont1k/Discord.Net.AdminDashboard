<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs - Discord Bot Admin</title>
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect width="26" height="26" rx="6" fill="#4f8ef7"/><text x="13" y="18" text-anchor="middle" fill="white" font-size="14" font-weight="800" font-family="sans-serif">D</text></svg>
        <span class="sidebar-brand">BotPanel</span>
      </div>
      <span class="sidebar-badge">v2.0</span>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">Navigation</div>
      <a href="/" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Overview
      </a>
      <a href="/guilds.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Guilds
      </a>
      <a href="/jobs.html" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Jobs
      </a>
      <a href="/logs.html" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Logs
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>Connected</span>
      </div>
      <span class="sidebar-version">v2.0.0</span>
    </div>
  </nav>
  <div class="main-area">
    <header class="topbar">
      <h1 class="page-title">Scheduled Jobs</h1>
      <div class="topbar-right">
        <span style="font-size:12px;color:var(--text-secondary)" id="jobCountLabel">Loading...</span>
      </div>
    </header>
    <main class="content">
      <div class="jobs-controls">
        <div class="jobs-filter" id="jobsFilter">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
          <button class="filter-btn" data-filter="Pending" onclick="setFilter('Pending')">Pending</button>
          <button class="filter-btn" data-filter="Running" onclick="setFilter('Running')">Running</button>
          <button class="filter-btn" data-filter="Failed" onclick="setFilter('Failed')">Failed</button>
          <button class="filter-btn" data-filter="Completed" onclick="setFilter('Completed')">Completed</button>
          <button class="filter-btn" data-filter="Cancelled" onclick="setFilter('Cancelled')">Cancelled</button>
        </div>
      </div>
      <div id="jobsContainer">
        <div class="jobs-table-wrapper">
          <table class="jobs-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Status</th>
                <th>Next Execution</th>
                <th>Cron</th>
                <th>Retries</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsBody"></tbody>
          </table>
        </div>
        <div id="jobsEmpty" class="empty-state" style="display:none">
          <div class="empty-state-icon">&#9203;</div>
          <div class="empty-state-title">No Jobs</div>
          <div class="empty-state-desc">No scheduled jobs match this filter.</div>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
let allJobs = [];
let currentFilter = 'all';

async function loadJobs() {
  try {
    const res = await fetch('/api/jobs');
    if (!res.ok) throw new Error(res.statusText);
    allJobs = await res.json();
    document.getElementById('jobCountLabel').textContent = allJobs.length + ' jobs total';
    applyFilter();
  } catch (e) {
    console.error('Failed to load jobs:', e);
    document.getElementById('jobsBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Failed to load jobs</td></tr>';
  }
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  applyFilter();
}

function applyFilter() {
  const filtered = currentFilter === 'all'
    ? allJobs
    : allJobs.filter(j => j.status === currentFilter);
  renderJobs(filtered);
}

function renderJobs(jobs) {
  const tbody = document.getElementById('jobsBody');
  const empty = document.getElementById('jobsEmpty');
  if (jobs.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = jobs.map(j => {
    const statusClass = 'status-' + j.status.toLowerCase();
    const nextRun = j.nextExecution ? new Date(j.nextExecution).toLocaleString() : '--';
    const cron = j.cronExpression || '--';
    const lastError = j.lastError ? j.lastError.substring(0, 60) + (j.lastError.length > 60 ? '...' : '') : '--';
    return `<tr>
      <td class="cell-id">${j.id.slice(0, 8)}</td>
      <td class="cell-name">${escapeHtml(j.jobType)}</td>
      <td><span class="job-status ${statusClass}">${j.status}</span></td>
      <td class="cell-date">${nextRun}</td>
      <td class="cell-cron">${cron}</td>
      <td style="text-align:center;font-size:11px;color:var(--text-muted)">${j.retryCount || 0}</td>
      <td>
        ${j.status !== 'Cancelled' && j.status !== 'Completed' ? `<button class="btn btn-sm btn-danger" onclick="cancelJob('${j.id}')">Cancel</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

async function cancelJob(id) {
  if (!confirm('Cancel this job?')) return;
  try {
    const res = await fetch('/api/jobs/' + encodeURIComponent(id) + '/cancel', { method: 'POST' });
    if (res.ok) { loadJobs(); }
    else { alert('Failed to cancel job'); }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

loadJobs();
setInterval(loadJobs, 15000);
</script>
</body>
</html>
