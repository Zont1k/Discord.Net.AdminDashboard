<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs - Discord.Net Admin</title>
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#5865f2"/><text x="14" y="19" text-anchor="middle" fill="white" font-size="14" font-weight="700">D</text></svg>
        <span class="sidebar-brand">Admin Panel</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <a href="/" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Overview</a>
      <a href="/guilds.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Guilds</a>
      <a href="/jobs.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Jobs</a>
      <a href="/logs.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Logs</a>
    </div>
    <div class="sidebar-footer">
      <div class="status-badge"><span class="status-dot"></span>Connected</div>
      <span class="sidebar-version">v1.0.0</span>
    </div>
  </nav>
  <div class="main-area">
    <header class="topbar">
      <h1 class="page-title">Scheduled Jobs</h1>
    </header>
    <main class="content">
      <div id="jobsContainer">
        <div class="jobs-table-wrapper">
          <table class="jobs-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Status</th>
                <th>Next Execution</th>
                <th>Cron</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsBody"></tbody>
          </table>
        </div>
        <div id="jobsEmpty" class="empty-state" style="display:none">
          <p>No scheduled jobs. Use <code>/schedule</code> to create one.</p>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
async function loadJobs() {
  try {
    const res = await fetch('/api/jobs');
    if (!res.ok) throw new Error(res.statusText);
    const jobs = await res.json();
    const tbody = document.getElementById('jobsBody');
    const empty = document.getElementById('jobsEmpty');
    if (jobs.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = jobs.map(j => {
      const statusClass = 'status-' + j.status.toLowerCase();
      const nextRun = j.nextExecution ? new Date(j.nextExecution).toLocaleString() : '--';
      const cron = j.cronExpression || '--';
      return `<tr>
        <td class="cell-id">${j.id.slice(0, 8)}</td>
        <td class="cell-name">${j.jobType}</td>
        <td><span class="job-status ${statusClass}">${j.status}</span></td>
        <td class="cell-date">${nextRun}</td>
        <td class="cell-cron">${cron}</td>
        <td>
          ${j.status !== 'Cancelled' ? `<button class="btn btn-sm btn-danger" onclick="cancelJob('${j.id}')">Cancel</button>` : ''}
        </td>
      </tr>`;
    }).join('');
  } catch (e) {
    console.error('Failed to load jobs:', e);
    document.getElementById('jobsBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Failed to load jobs</td></tr>';
  }
}
async function cancelJob(id) {
  if (!confirm('Cancel this job?')) return;
  try {
    const res = await fetch('/api/jobs/' + encodeURIComponent(id) + '/cancel', { method: 'POST' });
    if (res.ok) { loadJobs(); }
    else { alert('Failed to cancel job'); }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
loadJobs();
setInterval(loadJobs, 10000);
</script>
</body>
</html>
